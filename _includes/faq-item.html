{% comment %}
  Uso:
  {% include faq-item.html question="¿Pregunta?" answer="Respuesta." open=true %}
{% endcomment %}
<div class="faq-item {% if include.open %}is-open{% endif %}">
  <button class="faq-question" aria-expanded="{% if include.open %}true{% else %}false{% endif %}">
    <span>{{ include.question }}</span>
    <i class="ti ti-chevron-down chev" aria-hidden="true"></i>
  </button>
  <div class="faq-answer" {% unless include.open %}hidden{% endunless %}>
    <p>{{ include.answer }}</p>
  </div>
</div>
