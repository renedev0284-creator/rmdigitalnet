<header class="topnav">
  <a href="{{ '/' | relative_url }}" class="brand" aria-label="{{ site.title }}, ir a inicio">
    <span class="logo" aria-hidden="true">
      <img src="{{ site.logo | relative_url }}" alt="" width="500" height="500">
    </span>
    <span class="brandname">{{ site.title }}</span>
  </a>

  <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="main-menu" aria-label="Abrir menú">
    {% include icon.html name="menu" size=21 %}
  </button>

  <nav id="main-menu" class="menu" aria-label="Navegación principal">
    {% for item in site.nav %}
      <a href="{{ item.url | relative_url }}"
         {% if item.url == '/' and page.url == '/' %}class="active" aria-current="page"{% elsif item.url == page.url %}class="active" aria-current="page"{% endif %}>
        {{ item.text }}
      </a>
    {% endfor %}
    <a class="menu-contact" href="mailto:{{ site.author.email }}">Hablemos</a>
  </nav>
</header>
