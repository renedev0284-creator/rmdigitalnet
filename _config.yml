# ------------------------------------------------------------------
# Configuración del sitio — rmdigital.net
# Todo lo que es "identidad" (título, descripción, redes, autor) vive
# aquí para no tener que tocar layouts ni includes cuando cambie.
# ------------------------------------------------------------------

title: "rmdigital.net"
tagline: "Con calma, con orden, sin relleno."
description: >-
  René M. — hojas de cálculo, desarrollo de sistemas y pauta en Meta y Google.
  Creador de topoapp.net, plataforma de gestión de negocios.
url: "https://renedev0284-creator.github.io"
baseurl: "/rmdigitalnet"             # proyecto GitHub Pages: dominio base + nombre del repo

author:
  name: "René M."
  email: "rene0284@msn.com"

lang: es

logo: /assets/img/logo-rm-verde.png
default_social_image: /assets/img/social-default.png   # placeholder para og:image

paypal_email: "rene0284@msn.com"

# ------------------------------------------------------------------
# Colecciones y permalinks
# ------------------------------------------------------------------
permalink: /blog/:slug/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# ------------------------------------------------------------------
# Plugins soportados de forma nativa por GitHub Pages
# ------------------------------------------------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

feed:
  path: /feed.xml

# ------------------------------------------------------------------
# Navegación superior — editar aquí para agregar/quitar secciones
# ------------------------------------------------------------------
nav:
  - text: "inicio"
    url: "/"
  - text: "proyectos"
    url: "/#anuncios"
  - text: "servicios"
    url: "/#servicios"
  - text: "FAQ"
    url: "/#faqs"
  - text: "blog"
    url: "/blog/"

sass:
  sass_dir: _sass
  style: compressed

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - templates
  - assets/css/main.scss
