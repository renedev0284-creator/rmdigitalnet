# ------------------------------------------------------------------
# Configuración del sitio — rmdigital.net
# Todo lo que es "identidad" (título, descripción, redes, autor) vive
# aquí para no tener que tocar layouts ni includes cuando cambie.
# ------------------------------------------------------------------

title: "rmdigital.net"
tagline: "Con calma, con orden, sin relleno."
description: >-
  René Moya ayuda a emprendedores y negocios con hojas de cálculo, sistemas a
  medida, productos digitales, marketing y publicidad digital.
url: "https://rmdigital.net"
baseurl: ""
timezone: "America/Guatemala"

author:
  name: "René Moya"
  email: "rene0284@msn.com"

lang: es

logo: /assets/img/logo-rm-verde.png
default_social_image: /assets/img/social-default.png

social:
  links:
    - "https://github.com/renedev0284-creator"
    - "https://x.com/Rened_ev"
    - "https://www.facebook.com/profile.php?id=61579824642450"
    - "https://tiktok.com/@renemoya_"

paypal_email: "rene0284@msn.com"

# ------------------------------------------------------------------
# Colecciones y permalinks
# ------------------------------------------------------------------
permalink: /blog/:slug/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      image: /assets/img/social-default.png

# ------------------------------------------------------------------
# Plugins soportados de forma nativa por GitHub Pages
# ------------------------------------------------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

feed:
  path: /feed.xml

# ------------------------------------------------------------------
# Navegación superior — editar aquí para agregar/quitar secciones
# ------------------------------------------------------------------
nav:
  - text: "inicio"
    url: "/"
  - text: "proyectos"
    url: "/#anuncios"
  - text: "servicios"
    url: "/#servicios"
  - text: "FAQ"
    url: "/#faqs"
  - text: "blog"
    url: "/blog/"

sass:
  sass_dir: _sass
  style: compressed

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - templates
  - assets/css/main.scss
