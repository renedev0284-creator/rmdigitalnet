# Sidebar izquierdo: redes y proyectos.
# "icon" es la clase de Tabler Icons (https://tabler.io/icons) -- outline.
# "kind": "primary" se muestra con el sidebar normal,
# "kind": "support" se muestra separado (ej. botón de café).

left_sidebar:
