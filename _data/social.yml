    url: "https://github.com/tuusuario"
    icon: "ti ti-brand-github"
    kind: "primary"
  - name: "X"
    url: "https://x.com/tuusuario"
    icon: "ti ti-brand-x"
    kind: "primary"
  - name: "Instagram"
    url: "https://instagram.com/tuusuario"
    icon: "ti ti-brand-instagram"
    kind: "primary"
  - name: "topoapp.net"
    url: "https://topoapp.net"
    icon: "ti ti-world"
    kind: "primary"
