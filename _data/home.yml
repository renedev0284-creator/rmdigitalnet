faqs:
  - question: "¿Cómo empezamos a trabajar?"
    answer: "Cuéntame qué necesitas resolver, qué herramientas usas y cuál es tu prioridad. Te respondo con preguntas concretas y el siguiente paso."
    open: true
  - question: "¿Cuánto cuesta un proyecto?"
    answer: "Depende del alcance y la complejidad. Antes de cotizar, definimos juntos una primera versión útil para cuidar tu presupuesto y evitar trabajo innecesario."
  - question: "¿Trabajas con negocios pequeños?"
    answer: "Sí. Mi enfoque funciona especialmente bien para personas y equipos pequeños que necesitan ordenar procesos sin incorporar plataformas enormes."
  - question: "¿También das soporte después de entregar?"
    answer: "Sí. Podemos acordar acompañamiento, mejoras y mantenimiento según el tipo de solución y el ritmo de tu negocio."
