---
layout: default
---

<article class="card prose reveal">
  <p class="eyebrow">Blog</p>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%d %b %Y" }}</p>
  {% if page.lede %}
    <p class="lede">{{ page.lede }}</p>
  {% endif %}
  <div class="post-tags">
    {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
  <div class="prose-body">
    {{ content }}
  </div>
</article>
