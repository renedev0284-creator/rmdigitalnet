<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}
  {% include structured-data.html %}
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
  <link rel="icon" href="{{ '/assets/img/logo-rm-verde.png' | absolute_url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ '/assets/img/logo-rm-verde.png' | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    if ("IntersectionObserver" in window && !window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      document.documentElement.classList.add("motion-ready");
    }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | absolute_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>

  <a class="skip-link" href="#main-content">Saltar al contenido</a>

  <div class="frame">
    {% include topnav.html %}
    {{ content }}
    {% include footer.html %}
  </div>

  {% include cookie-banner.html %}
  <script src="{{ '/assets/js/main.js' | absolute_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
